<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js/flexible.js"></script>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/mine.css" />
    <title>个人中心</title>
  </head>
  <body>
    <header>
      <div class="scan">
        <img src="./images/icon/scan_icon.png" alt="" />
      </div>
      <h2>个人中心</h2>
      <div class="evaluate">
        <img src="./images/icon/evaluate_2_icon.png" alt="" />
        <img src="../images/icon/more_icon.png" alt="" />
      </div>
    </header>

    <!-- 个人卡片 -->
    <div class="card">
      <div class="info">
        <img src="./images/img/avatar_1.jpeg" alt="" />
        <div class="info-right">
          <div class="name">
            <span>廖某某</span>
            <img src="../images/icon/crown_icon.png" alt="" />
          </div>
          <div class="button">
            <span>黄金会员</span>
            <span>积分245</span>
          </div>
        </div>
      </div>
      <div class="info-bottom">
        <ul>
          <li class="after">
            <p>200</p>
            <p>已看</p>
          </li>
          <li class="after">
            <p>200</p>
            <p>想看</p>
          </li>
          <li class="after">
            <p>200</p>
            <p>讨论</p>
          </li>
          <li>
            <p>200</p>
            <p>记录</p>
          </li>
        </ul>
      </div>
    </div>

    <!-- 会员中心 -->
    <div class="vip">
      <div class="vip-left">
        <img src="../images/icon/diamand_icon.png" alt="" />
      </div>
      <div class="vip-mid">
        <p>会员中心</p>
        <p>开通影视卡会员专享8折优惠</p>
      </div>

      <div class="vip-right">
        <span>立即开通 </span>
        <img src="../images/icon/right_icon.png" alt="" />
      </div>
    </div>

    <!-- 我的订单 -->
    <div class="order">
      <div class="order-top">
        <img src="../images/icon/order_icon.png" alt="" />
        <span>我的订单</span>
        <img src="../images/icon/right_icon.png" alt="" />
      </div>

      <div class="order-con">
        <ul>
          <li>
            <div>
              <img src="../images/icon/wallet_icon.png" alt="" />
            </div>
            <span>我的钱包</span>
          </li>
          <li>
            <div>
              <img src="../images/icon/pay_icon.png" alt="" />
            </div>
            <p>待付款</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/evaluate_icon.png" alt="" />
            </div>
            <p>待评价</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/speed_icon.png" alt="" />
            </div>
            <p>退款</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/movie_a_icon.png" alt="" />
            </div>
            <p>电影票</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/music_icon.png" alt="" />
            </div>
            <p>演出票</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/coupon_icon.png" alt="" />
            </div>
            <p>优惠券</p>
          </li>
          <li>
            <div>
              <img src="../images/icon/score_icon.png" alt="" />
            </div>
            <p>兑积分</p>
          </li>
        </ul>
      </div>
    </div>

    <!-- 我的收藏 -->
    <div class="list">
      <img src="../images/icon/collect_icon.png" alt="" />
      <span>我的收藏</span>
      <img src="../images/icon/right_icon.png" alt="" />
    </div>

    <!-- 我的银行卡 -->
    <div class="list">
      <img src="../images/icon/card_icon.png" alt="" />
      <span>我的银行卡</span>
      <img src="../images/icon/right_icon.png" alt="" />
    </div>

    <!-- 我的小剧场 -->
    <div class="list last">
      <img src="../images/icon/theatre_icon.png" alt="" />
      <span>我的小剧场</span>
      <img src="../images/icon/right_icon.png" alt="" />
    </div>

    <footer>
      <a href="./index.html">
        <img src="./images/icon/home_n_icon.png" alt="" />
        <p>首页</p>
      </a>
      <a href="./movie.html">
        <img src="./images/icon/movie_n_icon.png" alt="" />
        <p>电影</p>
      </a>
      <a href="./cinema.html">
        <img src="./images/icon/cinema_n_icon.png" alt="" />
        <p>电影院</p>
      </a>
      <a href="./find.html">
        <img src="./images/icon/find_n_icon.png" alt="" />
        <p>发现</p>
      </a>
      <a href="./mine.html">
        <div>
          <img src="./images/icon/mine_a_icon.png" alt="" />
        </div>
        <p>我的</p>
      </a>
    </footer>
  </body>
</html>
